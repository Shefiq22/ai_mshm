name: ai_mshm
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.3.4

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Charts ────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0

  # ── Local storage (HRV history cache, used in checkin.dart) ───────────────
  shared_preferences: ^2.2.2

  # ── HTTP (for future backend API calls — rPPG, auth, etc.) ────────────────
  http: ^1.1.0

  # ── Camera & ML Kit (rPPG placeholders in checkin.dart & onboard.dart) ────
  # Uncomment these when you are ready to implement real camera capture:
  # camera: ^0.10.5
  # google_mlkit_face_detection: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true